<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Задача {{ task_id }}</title>
  <style>
    body { font-family: Segoe UI, sans-serif; margin: 0; background: #f4f7fb; color: #1a1a1a; }
    .wrap { max-width: 980px; margin: 24px auto; background: #fff; border-radius: 10px; box-shadow: 0 8px 30px rgba(15,23,42,.08); padding: 20px; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .badge { padding: 6px 10px; border-radius: 999px; background: #e5edf9; }
    textarea { width: 100%; min-height: 380px; border: 1px solid #d2d8e2; border-radius: 8px; padding: 10px; font-family: Consolas, monospace; }
    a.btn { display: inline-block; padding: 9px 12px; border-radius: 8px; text-decoration: none; background: #0a66c2; color: #fff; }
    .muted { color: #4b5563; }
    .err { color: #b91c1c; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <h2 style="margin:0;">Задача: {{ task_id }}</h2>
      <span id="status" class="badge">{{ status }}</span>
      <a href="/" class="btn">Новая задача</a>
    </div>

    <p class="muted">Логи обновляются в реальном времени по WebSocket.</p>
    <textarea id="logs" readonly>{{ initial_logs }}</textarea>
    <div id="error" class="err">{{ error }}</div>
  </div>

  <script>
    (function () {
      var taskId = "{{ task_id }}";
      var proto = (location.protocol === "https:") ? "wss" : "ws";
      var logs = document.getElementById("logs");
      var statusEl = document.getElementById("status");
      var err = document.getElementById("error");
      var wsCurrentStatus = '{{ status }}';
      var wsReconnectTimer = null;
      var ws = null;

      function appendLog(line) {
        logs.value += (logs.value ? "\n" : "") + line;
        logs.scrollTop = logs.scrollHeight;
      }

      function wsConnect() {
        if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
        ws = new WebSocket(proto + "://" + location.host + "/ws/" + taskId);

        ws.onmessage = function (ev) {
          try {
            var msg = JSON.parse(ev.data);
            if (msg.type === "log" && msg.text) appendLog(msg.text);
            if (msg.type === "status" && msg.status) {
              wsCurrentStatus = msg.status;
              statusEl.textContent = msg.status;
              if (msg.error) err.textContent = msg.error;
            }
          } catch (_) {
            appendLog(String(ev.data));
          }
        };

        ws.onclose = function () {
          if (wsCurrentStatus === 'running' || wsCurrentStatus === 'created') {
            wsReconnectTimer = setTimeout(wsConnect, 2000);
          }
        };
      }

      wsConnect();
    })();
  </script>
</body>
</html>
